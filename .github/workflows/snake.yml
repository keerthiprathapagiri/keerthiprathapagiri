name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: keerthiprathapagiri
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff69b4&color_dots=#161b22,#ffb6c1,#ff8dc7,#ff69b4,#ff1493
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff69b4&color_dots=#161b22,#ffb6c1,#ff8dc7,#ff69b4,#ff1493

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
