name: Sakura Snake Garden

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sakura-snake.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 1: Run snk to generate the real snake animation SVGs ─────────
      - name: Generate Snake Animations (snk)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Fetch contribution count via GraphQL ───────────────────────
      - name: Get Contribution Count
        id: contribs
        run: |
          TOTAL=$(curl -s -H "Authorization: bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"query{user(login:\"${{ github.repository_owner }}\"){contributionsCollection{contributionCalendar{totalContributions}}}}"}' \
            https://api.github.com/graphql | \
            node -e "let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{ const j=JSON.parse(d); console.log(j.data.user.contributionsCollection.contributionCalendar.totalContributions); })")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "Contributions this year: $TOTAL"

      # ── Step 3: Post-process SVGs into Sakura theme ───────────────────────
      - name: Transform to Sakura Theme
        env:
          CONTRIB_TOTAL: ${{ steps.contribs.outputs.total }}
        run: |
          node << 'NODEEOF'
          const fs = require('fs');

          const total = process.env.CONTRIB_TOTAL || '0';

          // ── Colour maps ──────────────────────────────────────────────────
          // GitHub light green shades → sakura pinks
          const LIGHT_MAP = {
            '#ebedf0': { fill: '#fdf0f5', stroke: '#f0d8e4', active: false },
            '#9be9a8': { fill: '#fccfdf', stroke: '#e8a8c4', active: true  },
            '#40c463': { fill: '#f0849e', stroke: '#d86088', active: true  },
            '#30a14e': { fill: '#e05080', stroke: '#c03060', active: true  },
            '#216e39': { fill: '#b02858', stroke: '#801840', active: true  },
          };

          // GitHub dark green shades → dark sakura purples
          const DARK_MAP = {
            '#161b22': { fill: '#12080f', stroke: '#280f20', active: false },
            '#0e4429': { fill: '#4a1230', stroke: '#6a2048', active: true  },
            '#006d32': { fill: '#7a2050', stroke: '#9a3068', active: true  },
            '#26a641': { fill: '#b03070', stroke: '#c84888', active: true  },
            '#39d353': { fill: '#d84888', stroke: '#e060a0', active: true  },
          };

          // snk snake colors to replace
          const SNAKE_COLORS = [
            '#4caf50','#2e7d32','#388e3c','#43a047','#66bb6a',
            '#81c784','#a5d6a7','orange','#f4a300','#f97316',
            '#4D9900','#6cd56c',
          ];
          const SNAKE_FILL_LIGHT  = '#9b2c6a';
          const SNAKE_STROKE_LIGHT = '#6a1445';
          const SNAKE_FILL_DARK   = '#e060a8';
          const SNAKE_STROKE_DARK = '#b02870';

          // ── Flower generator ─────────────────────────────────────────────
          // Draws 5 ellipse petals + center circle at (cx,cy), fitting inside
          // a cell of `cellSize` pixels. Petals are crisp and contained.
          function flower(cx, cy, cellSize, petalFill, centerFill) {
            const s  = cellSize * 0.78;   // flower diameter
            const R  = s * 0.36;          // petal-center distance
            const pw = s * 0.16;          // petal minor radius
            const ph = s * 0.27;          // petal major radius
            let out = `<g>`;
            for (let i = 0; i < 5; i++) {
              const deg = i * 72 - 90;
              const rad = deg * Math.PI / 180;
              const px  = (cx + Math.cos(rad) * R).toFixed(2);
              const py  = (cy + Math.sin(rad) * R).toFixed(2);
              out += `<ellipse cx="${px}" cy="${py}" rx="${pw.toFixed(2)}" ry="${ph.toFixed(2)}" fill="${petalFill}" transform="rotate(${deg},${px},${py})"/>`;
            }
            out += `<circle cx="${cx.toFixed(2)}" cy="${cy.toFixed(2)}" r="${(s*0.11).toFixed(2)}" fill="${centerFill}"/>`;
            out += `</g>`;
            return out;
          }

          // ── Falling petal animation ───────────────────────────────────────
          function fallingPetals(svgWidth, svgHeight, isDark) {
            const petalColor = isDark ? '#a02060' : '#f4b8d0';
            const seeds = [0.07,0.15,0.24,0.33,0.42,0.51,0.60,0.69,0.78,0.87,0.95];
            let out = `<g class="sakura-petals">`;
            seeds.forEach((frac, i) => {
              const x = Math.round(frac * svgWidth);
              const delay = (i * 0.9).toFixed(1);
              const dur   = (6.5 + (i % 4) * 1.2).toFixed(1);
              const drift = 18 + (i % 3) * 8;
              // Single petal path (simplified oval)
              const pw = 3.5, ph = 5;
              out += `<ellipse cx="${x}" cy="-6" rx="${pw}" ry="${ph}" fill="${petalColor}" opacity="0.55">
                <animateTransform attributeName="transform" type="translate" values="${x},-8; ${x+drift},${svgHeight+10}" dur="${dur}s" begin="${delay}s" repeatCount="indefinite" additive="replace"/>
                <animateTransform attributeName="transform" type="rotate" values="0,${x},-8; 30,${x+drift/2},${svgHeight/2}" dur="${dur}s" begin="${delay}s" repeatCount="indefinite" additive="sum"/>
                <animate attributeName="opacity" values="0;0.55;0.55;0" dur="${dur}s" begin="${delay}s" repeatCount="indefinite"/>
              </ellipse>`;
            });
            out += `</g>`;
            return out;
          }

          // ── Header (contribution count) ───────────────────────────────────
          function header(svgWidth, totalContribs, isDark) {
            const textColor   = isDark ? '#e080b8' : '#9b2c6a';
            const strokeColor = isDark ? '#5a1840' : '#f0c0d8';
            // Add 40px to SVG height for header by adjusting viewBox
            return {
              defs: '',
              markup: `<g class="sakura-header">
                <text x="${(svgWidth/2).toFixed(0)}" y="20"
                  text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
                  font-size="13" font-weight="600" fill="${textColor}" letter-spacing="0.3">
                  &#x1F338; ${parseInt(totalContribs,10).toLocaleString()} contributions in the last year
                </text>
                <line x1="20" y1="28" x2="${svgWidth-20}" y2="28"
                  stroke="${strokeColor}" stroke-width="0.8" stroke-dasharray="4,6"/>
              </g>`,
            };
          }

          // ── Main processor ────────────────────────────────────────────────
          function process(svgText, cellMap, snakeFill, snakeStroke, isDark) {
            let svg = svgText;

            // Background
            svg = svg.split('fill="#ffffff"').join('fill="#fff5f8"');
            svg = svg.split('fill="#0d1117"').join(isDark ? 'fill="#120810"' : 'fill="#fff5f8"');
            svg = svg.split('fill="#161b22"').join(isDark ? 'fill="#120810"' : 'fill="#fff5f8"');

            // Parse SVG dimensions for header offset
            const wMatch = svg.match(/width="(\d+)"/);
            const hMatch = svg.match(/height="(\d+)"/);
            const svgW = wMatch ? parseInt(wMatch[1]) : 830;
            const svgH = hMatch ? parseInt(hMatch[1]) : 112;
            const HEADER_H = 36;

            // Expand height for header
            svg = svg.replace(`height="${svgH}"`, `height="${svgH + HEADER_H}"`);

            // Shift existing content down by HEADER_H using a wrapping group
            // snk puts content in a <g transform="translate(...)"> - update that
            svg = svg.replace(
              /(<g[^>]*transform="translate\()(\d+),\s*(\d+)(\)")/,
              (_, pre, tx, ty, suf) => `${pre}${tx},${parseInt(ty) + HEADER_H}${suf}`
            );

            // Cell color replacements
            const activeColors = new Set();
            for (const [gh, sakura] of Object.entries(cellMap)) {
              if (svg.includes(`fill="${gh}"`)) {
                svg = svg.split(`fill="${gh}"`).join(
                  `fill="${sakura.fill}" stroke="${sakura.stroke}" stroke-width="0.5"`
                );
                if (sakura.active) activeColors.add(sakura.fill);
              }
            }

            // Snake body recolor
            for (const sc of SNAKE_COLORS) {
              if (svg.includes(`fill="${sc}"`)) {
                svg = svg.split(`fill="${sc}"`).join(`fill="${snakeFill}"`);
              }
              if (svg.includes(`stroke="${sc}"`)) {
                svg = svg.split(`stroke="${sc}"`).join(`stroke="${snakeStroke}"`);
              }
              // Also handle color= attributes in style blocks
              svg = svg.split(`color:${sc}`).join(`color:${snakeFill}`);
            }

            // ── Inject flowers on active cells ────────────────────────────
            // Parse all rect elements and build flower overlays
            const flowers = [];
            const rectRe = /<rect\b([^>]*)\/>/g;
            let m;
            while ((m = rectRe.exec(svg)) !== null) {
              const attrs = m[1];
              const fillM = attrs.match(/fill="(#[a-fA-F0-9]{6})"/);
              if (!fillM || !activeColors.has(fillM[1])) continue;

              const xM = attrs.match(/\bx="([\d.]+)"/);
              const yM = attrs.match(/\by="([\d.]+)"/);
              const wM = attrs.match(/\bwidth="([\d.]+)"/);
              if (!xM || !yM || !wM) continue;

              const x = parseFloat(xM[1]), y = parseFloat(yM[1]);
              const w = parseFloat(wM[1]);
              const cx = x + w / 2, cy = y + w / 2;

              const petalFill  = isDark ? '#c850a0' : fillM[1];
              // Darken petal for light mode so flower is visible on matching bg
              const petalFillDark = isDark ? '#e880c8' : '#c03875';
              const centerFill = '#fff0f8';

              // Two-tone: outer petals slightly different shade
              flowers.push(flower(cx, cy, w, isDark ? '#c850a0' : '#d45585', centerFill));
            }

            // Build header and petals
            const hdr = header(svgW, total, isDark);
            const petals = fallingPetals(svgW, svgH + HEADER_H, isDark);

            // Inject header right after opening <svg ...>
            svg = svg.replace(/(<svg[^>]*>)/, `$1${hdr.markup}`);

            // Inject flowers + petals before </svg>
            svg = svg.replace('</svg>',
              `<g class="flowers" transform="translate(0,${HEADER_H})">${flowers.join('')}</g>${petals}</svg>`
            );

            return svg;
          }

          // ── Process light mode ────────────────────────────────────────────
          const lightSvg = fs.readFileSync('dist/github-snake.svg', 'utf8');
          const sakuraLight = process(lightSvg, LIGHT_MAP, SNAKE_FILL_LIGHT, SNAKE_STROKE_LIGHT, false);
          fs.writeFileSync('dist/sakura-snake.svg', sakuraLight);
          console.log('✅ dist/sakura-snake.svg written');

          // ── Process dark mode ─────────────────────────────────────────────
          const darkSvg = fs.readFileSync('dist/github-snake-dark.svg', 'utf8');
          const sakuraDark = process(darkSvg, DARK_MAP, SNAKE_FILL_DARK, SNAKE_STROKE_DARK, true);
          fs.writeFileSync('dist/sakura-snake-dark.svg', sakuraDark);
          console.log('✅ dist/sakura-snake-dark.svg written');
          NODEEOF

      # ── Step 4: Deploy all four files to output branch ────────────────────
      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "🌸 Update Sakura Snake [skip ci]"
